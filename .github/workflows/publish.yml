name: Upload Python Package to PyPI

on:
  release:
    types: [published]
  # Alternatively, trigger it manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    
    # Specifies the GitHub environment to match the one you type in PyPI
    environment:
      name: pypi
      url: https://pypi.org/p/your-package-name # Replace with your actual PyPI project name

    # IMPORTANT: This permission is required for trusted publishing via OIDC
    permissions:
      id-token: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Build package
      run: python -m build
      
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
